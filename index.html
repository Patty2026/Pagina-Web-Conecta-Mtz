<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta Martínez | App Ciudadana</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="./app-clean.css?v=202606-map-status-fix" />
</head>
<body>
  <main id="app" class="app">
    <section id="welcomeScreen" class="screen active">
      <div class="logo-box">
        <img src="./logo-conecta-martinez.png" alt="Conecta Martínez" />
        <small>Juntos resolvemos más</small>
      </div>
      <div class="hero-card">
        <h1>¡Bienvenido!</h1>
        <p>Reporta, consulta y da seguimiento a incidencias urbanas de Martínez de la Torre.</p>
        <div class="actions-row">
          <button id="startBtn" class="btn-primary full" type="button">Comenzar</button>
          <button id="aboutBtn" class="btn-secondary full" type="button">Acerca de ConectaMartínez</button>
        </div>
      </div>
    </section>

    <section id="authScreen" class="screen">
      <div class="logo-box">
        <img src="./logo-conecta-martinez.png" alt="Conecta Martínez" />
      </div>
      <article class="auth-card">
        <h2 id="authTitle">Iniciar sesión</h2>
        <p id="authSubtitle">Accede para continuar.</p>
        <form id="authForm" class="form-grid">
          <label>Nombre
            <input id="nameInput" type="text" autocomplete="name" placeholder="Tu nombre" />
          </label>
          <label>Correo electrónico
            <input id="emailInput" type="email" autocomplete="email" required placeholder="correo@ejemplo.com" />
          </label>
          <label>Contraseña
            <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="Mínimo 6 caracteres" />
          </label>
          <label id="roleLabel">Tipo de usuario
            <select id="roleInput">
              <option value="Ciudadano">Ciudadano</option>
              <option value="Apoyo comunitario">Apoyo comunitario</option>
            </select>
          </label>
          <button id="authSubmit" class="btn-primary full" type="submit">Iniciar sesión</button>
        </form>
        <button id="toggleAuthBtn" class="btn-ghost full" type="button">¿No tienes cuenta? Regístrate</button>
        <p id="authMessage" class="message"></p>
      </article>
    </section>

    <section id="mainScreen" class="screen">
      <header class="topbar">
        <div class="user-line">
          <div id="userAvatar" class="avatar">C</div>
          <div>
            <b id="userName">Usuario</b>
            <small id="userRole">Ciudadano</small>
          </div>
        </div>
        <button id="logoutBtn" class="btn-secondary" type="button">Salir</button>
      </header>

      <section id="panelView" class="view active"></section>
      <section id="mapView" class="view"></section>
      <section id="reportsView" class="view"></section>
      <section id="profileView" class="view"></section>

      <nav class="bottom-nav" aria-label="Navegación principal">
        <button class="active" data-view="panel" type="button">Panel</button>
        <button data-view="map" type="button">Mapa</button>
        <button data-view="reports" type="button">Reportes</button>
        <button data-view="profile" type="button">Perfil</button>
      </nav>
    </section>
  </main>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <article class="modal-card">
      <div class="status-line">
        <h3 id="modalTitle">Detalle</h3>
        <button id="closeModalBtn" class="btn-secondary" type="button">Cerrar</button>
      </div>
      <div id="modalBody"></div>
    </article>
  </div>

  <script>
    window.ConectaGoogleMapsFailed = false;
    window.ConectaUseFallbackMap = false;
    window.gm_authFailure = function () {
      window.ConectaGoogleMapsFailed = true;
      window.ConectaUseFallbackMap = true;
      window.dispatchEvent(new CustomEvent('conecta-render-fallback-map', {
        detail: { reason: 'Google Maps rechazó la API Key. Revisa restricciones, dominio permitido, API habilitada o facturación.' }
      }));
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyArAW7ori6d5DpHW3lMEvLDl8q0iQl7spc&libraries=places&loading=async" defer></script>
  <script type="module" src="./app-clean.js?v=202606-map-status-fix"></script>
  <script type="module" src="./google-maps-adapter.js?v=202606-map-status-fix"></script>
  <script type="module" src="./maps-fallback.js?v=202606-map-status-fix"></script>
  <script src="./ui-cleanup.js?v=202606-map-status-fix" defer></script>
</body>
</html>
