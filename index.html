<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Conecta Martínez | App Ciudadana</title>
  <meta name="description" content="Aplicación ciudadana para reportes, seguimiento y apoyo comunitario en Martínez de la Torre." />
  <meta name="theme-color" content="#07133c" />
  <link rel="icon" href="./logo-conecta-martinez.png" />
  <link rel="stylesheet" href="./app-clean.css?v=202606-map-fix" />
</head>
<body>
  <main class="app" id="appRoot">
    <section id="welcomeScreen" class="screen active" aria-label="Bienvenida">
      <div class="logo-box">
        <img src="./logo-conecta-martinez.png" alt="Conecta Martínez" />
        <small>Juntos resolvemos más</small>
      </div>

      <article class="hero-card">
        <h1>¡Bienvenido!</h1>
        <p>Reporta incidencias, consulta avances y mantente conectado con tu comunidad.</p>
      </article>

      <div class="actions-row">
        <button id="goLoginBtn" class="btn-primary full" type="button">Iniciar sesión</button>
        <button id="goRegisterBtn" class="btn-secondary full" type="button">Crear cuenta</button>
      </div>
    </section>

    <section id="authScreen" class="screen" aria-label="Autenticación">
      <div class="logo-box compact">
        <img src="./logo-conecta-martinez.png" alt="Conecta Martínez" />
      </div>

      <article class="auth-card">
        <h2 id="authTitle">Iniciar sesión</h2>
        <p id="authSubtitle">Accede para continuar.</p>

        <form id="authForm" class="form-grid" autocomplete="on">
          <label>
            Correo electrónico
            <input id="authEmail" type="email" autocomplete="email" placeholder="correo@ejemplo.com" required />
          </label>

          <label>
            Contraseña
            <input id="authPassword" type="password" autocomplete="current-password" minlength="6" placeholder="Mínimo 6 caracteres" required />
          </label>

          <div id="registerFields" class="form-grid hidden">
            <label>
              Nombre
              <input id="registerName" type="text" autocomplete="name" placeholder="Tu nombre" />
            </label>

            <label>
              Tipo de cuenta
              <select id="registerRole">
                <option value="Ciudadano">Ciudadano</option>
                <option value="Apoyo comunitario">Apoyo comunitario</option>
              </select>
            </label>
          </div>

          <button id="authSubmitBtn" class="btn-primary full" type="submit">Iniciar sesión</button>
          <button id="toggleAuthBtn" class="btn-ghost full" type="button">No tengo cuenta, registrarme</button>
          <button id="backWelcomeBtn" class="btn-secondary full" type="button">Volver</button>
          <div id="authMessage" class="message" role="status" aria-live="polite"></div>
        </form>
      </article>
    </section>

    <section id="mainScreen" class="screen" aria-label="Aplicación">
      <header class="topbar">
        <div class="user-line">
          <div id="userAvatar" class="avatar">C</div>
          <div>
            <b id="userName">Conecta Martínez</b>
            <small id="userRole">Sincronizando perfil...</small>
          </div>
        </div>
        <button id="logoutBtn" class="btn-secondary" type="button">Salir</button>
      </header>

      <section id="panelView" class="view active" aria-label="Panel principal"></section>
      <section id="mapView" class="view" aria-label="Mapa"></section>
      <section id="reportsView" class="view" aria-label="Reportes"></section>
      <section id="profileView" class="view" aria-label="Perfil"></section>
    </section>
  </main>

  <nav id="bottomNav" class="bottom-nav hidden" aria-label="Menú principal">
    <button type="button" data-view="panel" class="active">Panel</button>
    <button type="button" data-view="map">Mapa</button>
    <button type="button" data-view="reports">Reportes</button>
    <button type="button" data-view="profile">Perfil</button>
  </nav>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <article class="modal-card">
      <div class="status-line">
        <h3 id="modalTitle">Detalle</h3>
        <button id="closeModalBtn" class="btn-secondary" type="button">Cerrar</button>
      </div>
      <div id="modalBody"></div>
    </article>
  </div>

  <script>
    window.ConectaGoogleMapsFailed = false;
    window.ConectaUseFallbackMap = false;
    window.gm_authFailure = function () {
      window.ConectaGoogleMapsFailed = true;
      window.ConectaUseFallbackMap = true;
      window.dispatchEvent(new CustomEvent('conecta-render-fallback-map', {
        detail: { reason: 'Google Maps rechazó la API Key. Revisa restricciones, dominio permitido, API habilitada o facturación.' }
      }));
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyArAW7ori6d5DpHW3lMEvLDl8q0iQl7spc&libraries=places" defer></script>
  <script type="module" src="./app-clean.js?v=202606-map-fix"></script>
  <script type="module" src="./google-maps-adapter.js?v=202606-map-fix"></script>
  <script type="module" src="./maps-fallback.js?v=202606-map-fix"></script>
  <script src="./ui-cleanup.js?v=202606-map-fix" defer></script>
</body>
</html>
